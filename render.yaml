services:
  - type: web
    name: restaurant-waitlist
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: ADMIN_PIN
        sync: false
      - key: DATA_FILE
        value: /opt/render/project/src/storage/queue.json
    disk:
      name: waitlist-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
